name: "17c_"
geometry:
  shells:
    - id: 1
      outer_radius: 1.0       # [cm]
      num_cells: 100
      material: m1
      source: none

angular_quadrature:
  sn_order: 4

materials:
  - id: m1
    sigma_t: 2.0             # [1/cm]  (sigma_s0 = sigma_t - sigma_a = 1)
    sigma_a: 1.0
    scattering_order: 3      # P3 anisotropic scattering
    sigma_s_moments:         # k=1..3, all equal to sigma_s = 1 cm^-1
      - 1.0
      - 1.0
      - 1.0

sources:
  boundary:
    # Incident flux at the outer surface of the outermost shell
    isotropic_flux: 1.0
    normalize: true

solver:
  acceleration: none           # none | dsa
  convergence_tolerance: 1.0e-4
  max_iterations: 500

output:
  directory: ./
  scalar_flux_csv: true           # cell-centered \phi_i across all shells
  scalar_flux_pdv: true           # cell-centered \phi_i across all shells
  balance_table: true         # source rate, inflow, outflow, absorption, balance measure
  angular_flux_boundary: false # all \psi_m at outer boundary
  starting_direction_origin: false  # \psi_{1/2} at r = 0