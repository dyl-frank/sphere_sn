name: "17d_"
geometry:
  shells:
    - id: 1
      outer_radius: 1.0       # [cm]
      num_cells: 100
      material: m1
      source: src_uniform

angular_quadrature:
  sn_order: 8

materials:
  - id: m1
    sigma_t: 30.0             # [1/cm]  (sigma_s0 = sigma_t - sigma_a = 1)
    sigma_a: 0.0

sources:
  boundary:
    # Incident flux at the outer surface of the outermost shell
    isotropic_flux: 0.0
  distributed:
    - id: src_uniform
      strength: 1.0
      normalize: false

solver:
  acceleration: dsa           # none | dsa
  convergence_tolerance: 1.0e-4
  max_iterations: 500

output:
  directory: ./
  scalar_flux_csv: true           # cell-centered \phi_i across all shells
  scalar_flux_pdv: true           # cell-centered \phi_i across all shells
  balance_table: true         # source rate, inflow, outflow, absorption, balance measure
  angular_flux_boundary: false # all \psi_m at outer boundary
  starting_direction_origin: false  # \psi_{1/2} at r = 0